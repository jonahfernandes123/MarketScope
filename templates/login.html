<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In &mdash; MarketScope</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%233b82f6'/%3E%3Ccircle cx='16' cy='16' r='7' stroke='white' stroke-width='2' fill='none'/%3E%3Ccircle cx='16' cy='16' r='2.5' fill='white'/%3E%3Cline x1='16' y1='6' x2='16' y2='9.5' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='16' y1='22.5' x2='16' y2='26' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='6' y1='16' x2='9.5' y2='16' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='22.5' y1='16' x2='26' y2='16' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d0f14;
    --surface: #151820;
    --border:  #1e2330;
    --text:    #e8eaf0;
    --muted:   #8b93a8;
    --dim:     #4a5268;
    --accent:  #3b82f6;
    --accent-h:#2563eb;
    --error-bg:#2d1a1a;
    --error:   #f87171;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .login-wrap {
    width: 100%;
    max-width: 440px;
  }

  .login-brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    text-align: center;
  }

  .login-brand-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .login-logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }

  .login-brand-name {
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .login-tagline {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.01em;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
  }

  .login-title {
    font-size: 1.35rem;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .login-subtitle {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 7px;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 0.875rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus {
    border-color: var(--accent);
  }

  /* Password field wrapper — positions the eye toggle inside the input */
  .field-pw {
    position: relative;
  }

  .field-pw input {
    padding-right: 42px; /* leave room for the button */
  }

  .pw-toggle {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 38px;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--dim);
    transition: color 0.15s;
    padding: 0;
  }

  .pw-toggle:hover { color: var(--muted); }

  .pw-toggle svg {
    width: 16px; height: 16px;
    display: block;
    pointer-events: none;
  }

  .error-box {
    background: var(--error-bg);
    border: 1px solid #5c2020;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.8rem;
    color: var(--error);
    margin-bottom: 18px;
  }

  .login-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px;
    font-family: inherit;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 8px;
  }

  .login-btn:hover { background: var(--accent-h); }
  .login-btn:active { opacity: 0.9; }

  .login-brand-mark { width: 18px; height: 18px; display: block; }
  .login-brand-ai { opacity: 0.55; font-weight: 500; }
</style>
</head>
<body>

<div class="login-wrap">

  <div class="login-brand">
    <div class="login-brand-row">
      <div class="login-logo">
        <svg class="login-brand-mark" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="10" cy="10" r="5.5" stroke="currentColor" stroke-width="1.6"/>
          <circle cx="10" cy="10" r="1.75" fill="currentColor"/>
          <line x1="10" y1="1.5" x2="10" y2="4.25" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="10" y1="15.75" x2="10" y2="18.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="1.5" y1="10" x2="4.25" y2="10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="15.75" y1="10" x2="18.5" y2="10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="login-brand-name">MarketScope</span>
    </div>
    <span class="login-tagline">Commodities &middot; FX &middot; Crypto &middot; Macro</span>
  </div>

  <div class="login-card">
    <div class="login-title">Sign in</div>
    <div class="login-subtitle">Enter your credentials to continue</div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" autocomplete="off">
      <div class="field">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          autocomplete="off"
          autofocus
          value="{{ prefill_username }}"
          required
        >
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="field-pw">
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="off"
            required
          >
          <button
            type="button"
            class="pw-toggle"
            id="pw-toggle-btn"
            aria-label="Show password"
            tabindex="-1"
          >
            <!-- Eye open (shown when password is hidden) -->
            <svg id="icon-eye-open" xmlns="http://www.w3.org/2000/svg" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              <circle cx="12" cy="12" r="3" stroke-linecap="round"/>
            </svg>
            <!-- Eye closed (shown when password is visible) -->
            <svg id="icon-eye-closed" xmlns="http://www.w3.org/2000/svg" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
                 style="display:none">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.042-3.367M6.7 6.7A9.956 9.956 0 0112 5c4.478 0 8.268 2.943 9.542 7a9.973 9.973 0 01-4.21 5.442M3 3l18 18"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="login-btn">Sign in</button>
    </form>
  </div>

</div>

<script>
  (function () {
    var input  = document.getElementById('password');
    var btn    = document.getElementById('pw-toggle-btn');
    var eyeOn  = document.getElementById('icon-eye-open');
    var eyeOff = document.getElementById('icon-eye-closed');

    btn.addEventListener('click', function () {
      var showing = input.type === 'text';
      input.type      = showing ? 'password' : 'text';
      eyeOn.style.display  = showing ? '' : 'none';
      eyeOff.style.display = showing ? 'none' : '';
      btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
    });
  })();
</script>

</body>
</html>
